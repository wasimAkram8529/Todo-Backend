name: "Todo Backend CI workflow"

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup node environment
        uses: actions/setup-node@v4
        with:
          node-version: 22.0
          cache: npm

      - name: install dependency
        run: npm ci

      - name: run test
        run: npm test

      - name: run lint
        run: npm run lint

  build-docker-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate user to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Short SHA
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" > $GITHUB_ENV

      - name: Build docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/todo-backend:staging-${{ env.SHORT_SHA }} \
          -t ${{ secrets.DOCKER_USERNAME }}/todo-backend:staging-latest \
          .

      - name: Push docker image to docker hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend --all-tags
